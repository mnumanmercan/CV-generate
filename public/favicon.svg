<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Document body -->
  <rect x="3" y="1" width="22" height="29" rx="3" fill="#0C1523"/>
  <rect x="3" y="1" width="22" height="29" rx="3" stroke="#1a3a5e" stroke-width="0.75"/>
  <!-- Header band (gradient, full-width, rounded top) -->
  <path d="M 3 4 A 3 3 0 0 1 6 1 H 22 A 3 3 0 0 1 25 4 V 12 H 3 Z" fill="url(#hdr)"/>
  <!-- Sheen over header -->
  <path d="M 3 4 A 3 3 0 0 1 6 1 H 22 A 3 3 0 0 1 25 4 V 12 H 3 Z" fill="url(#sheen)"/>
  <!-- Avatar circle in header -->
  <circle cx="9.5" cy="6" r="2.5" fill="rgba(255,255,255,0.92)"/>
  <!-- Name line -->
  <rect x="14" y="4" width="9" height="2.2" rx="1.1" fill="rgba(255,255,255,0.95)"/>
  <!-- Title line -->
  <rect x="14" y="8" width="6.5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.60)"/>
  <!-- Thin divider under header -->
  <rect x="6" y="14" width="16" height="0.5" rx="0.25" fill="rgba(255,255,255,0.07)"/>
  <!-- Content text lines -->
  <rect x="6" y="16.5" width="15" height="1.8" rx="0.9" fill="#94A3B8" opacity="0.45"/>
  <rect x="6" y="20"   width="11" height="1.8" rx="0.9" fill="#94A3B8" opacity="0.35"/>
  <rect x="6" y="23.5" width="13" height="1.8" rx="0.9" fill="#94A3B8" opacity="0.35"/>
  <rect x="6" y="27"   width="9"  height="1.8" rx="0.9" fill="#94A3B8" opacity="0.25"/>
</svg>
